  <script>
    // PWA Install prompt
    let deferredPrompt;
    const banner = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const closeBtn = document.getElementById('close-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      banner.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      banner.classList.add('hidden');
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
      }
    });

    closeBtn.addEventListener('click', () => banner.classList.add('hidden'));

    window.addEventListener('appinstalled', () => banner.classList.add('hidden'));

    // Simple in-memory storage fallback (when window.storage is not available)
    if (!window.storage) {
      const _store = {};
      window.storage = {
        get: async (key) => _store[key] ? { key, value: _store[key] } : null,
        set: async (key, value) => { _store[key] = value; return { key, value }; },
        delete: async (key) => { delete _store[key]; return { key, deleted: true }; },
        list: async () => ({ keys: Object.keys(_store) }),
      };
      // Also try localStorage as persistent fallback
      try {
        const _orig = window.storage;
        window.storage = {
          get: async (key) => {
            try { const v = localStorage.getItem('coc__' + key); return v ? { key, value: v } : null; } catch { return _orig.get(key); }
          },
          set: async (key, value) => {
            try { localStorage.setItem('coc__' + key, value); return { key, value }; } catch { return _orig.set(key, value); }
          },
          delete: async (key) => {
            try { localStorage.removeItem('coc__' + key); return { key, deleted: true }; } catch { return _orig.delete(key); }
          },
          list: async () => _orig.list(),
        };
      } catch { /* localStorage недоступен */ }
    }
  </script>

      img.onload=()=>{
        const[mW,mH]=[160,110],r=Math.min(mW/img.width,mH/img.height,1);
        const c=document.createElement("canvas");
        c.width=Math.max(1,Math.round(img.width*r));
        c.height=Math.max(1,Math.round(img.height*r));
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        try{resolve(c.toDataURL("image/jpeg",0.55));}catch{resolve(null);}
      };
      img.onerror=()=>resolve(null);
      img.src=dataUrl;

    const callClaude=async({messages,maxTokens=1000,useSearch=false,retries=1})=>{
      const apiKey=(localStorage.getItem("coc_api_key")||"").trim();
      if(!apiKey)throw new Error("API ключ не введён — нажми ⚙️ и введи ключ");
      for(let attempt=0;attempt<=retries;attempt++){
        try{
          const body={model:"claude-sonnet-4-6",max_tokens:maxTokens,messages};
          if(useSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
          const resp=await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body),
          });
          if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e?.error?.message||`Ошибка ${resp.status}`);}
          const data=await resp.json();
          if(data.error)throw new Error(data.error.message);
          return data.content.filter(c=>c.type==="text").map(c=>c.text).join("\n");
        }catch(err){
          if(attempt===retries)throw err;
          await new Promise(r=>setTimeout(r,800*(attempt+1)));
        }
      }
    };

      if(!text)throw new Error("Пустой ответ");

      const offlineScanBase=(thLevel)=>{
        const types=["war","farming","trophy"];
        const weaknesses=[
          ["слабый северный угол","открытые Archer Tower","мало ловушек у периметра"],
          ["линейная расстановка","Eagle Artillery на краю","слабый воздушный контроль"],
          ["нет Inferno прикрытия","открытый Clan Castle","плохая защита ТХ"],
          ["симметричная база","предсказуемые ловушки","слабый центр"],
        ];
        const entries=["северо-запад","северо-восток","юго-запад","юго-восток","север","юг"];
        const defenses=["Eagle Artillery","Scattershot","Inferno Tower","Monolith","Spell Tower","Scattershot x2"];
        return{
          th_level:parseInt(thLevel)||15,
          base_type:types[Math.floor(Math.random()*types.length)],
          weaknesses:weaknesses[Math.floor(Math.random()*weaknesses.length)].slice(0,2),
          key_defenses:[defenses[Math.floor(Math.random()*defenses.length)],defenses[Math.floor(Math.random()*defenses.length)]],
          best_entry:entries[Math.floor(Math.random()*entries.length)],
          cc_pull:"с "+entries[Math.floor(Math.random()*entries.length)],
        };
      };

      const offlineSimulate=(army,base)=>{
        // Реалистичная симуляция с весами по типу состава
        const nameL=army.name.toLowerCase();
        let baseStars=2,baseDest=65;
        if(nameL.includes("root rider")){baseStars=3;baseDest=88;}
        else if(nameL.includes("super witch")){baseStars=3;baseDest=85;}
        else if(nameL.includes("lalo")){baseStars=3;baseDest=82;}
        else if(nameL.includes("zap")){baseStars=2;baseDest=78;}
        else if(nameL.includes("hybrid")){baseStars=2;baseDest=75;}
        else if(nameL.includes("clone")){baseStars=3;baseDest=90;}
        // Случайность ±12%
        const rand=(Math.random()-0.5)*24;
        let dest=Math.min(100,Math.max(20,baseDest+rand));
        let stars=dest>=100?3:dest>=65?Math.min(3,baseStars):dest>=40?Math.min(2,baseStars-1):dest>=20?1:0;
        // Тайминги
        const timelines={
          3:["0:00 — Вытяжка CC успешна","0:30 — Вход войск с "+base.best_entry,"1:30 — Rage на "+base.key_defenses[0],"2:30 — Freeze на ключевую защиту","3:00 — Зачистка","3:30 — ТХ уничтожен"],
          2:["0:00 — Вытяжка CC","0:40 — Вход с "+base.best_entry,"1:30 — Rage активирован","2:30 — Потери у "+base.key_defenses[0],"3:30 — Частичная зачистка"],
          1:["0:00 — Неудачная вытяжка CC","1:00 — Войска рассеялись","2:00 — "+base.key_defenses[0]+" устоял","3:00 — Атака провалилась"],
          0:["0:00 — CC не вытянут","0:30 — "+base.key_defenses[0]+" уничтожил войска","1:00 — Атака провалена"],
        };
        const moments={3:"Rage попал точно в "+base.key_defenses[0],2:"Войска остановлены у "+base.key_defenses[0],1:"CC не вытянут — провал атаки",0:base.key_defenses[0]+" уничтожил всех"};
        return{stars,destruction:Math.round(dest),timeline:timelines[stars]||[],key_moment:moments[stars]||"",verdict:stars===3?"Отлично!":stars===2?"Хорошо":stars===1?"Слабо":"Провал",fail_reason:stars<2?base.key_defenses[0]+" слишком сильный":null};
      };

        setTLoading(true);setTError(null);setTrends(null);

      const generateArmies=async(base)=>{

      const simulateAttack=async(army,base)=>{
        await new Promise(r=>setTimeout(r,200+Math.random()*300));

        return{...res,id:army.id,name:army.name,army:army.army,spells:army.spells,siege:army.siege,pet:army.pet};
      };

      const runSimulation=async()=>{
        if(!payload)return;
        cancelRef.current=false;
        setSimRunning(true);setSimResults([]);setSimCurrent(0);
        setBestResult(null);setError(null);setSimPhase("scanning");setExpandedResult(null);
        const imgBlock=payload.kind==="base64"
          ?{type:"image",source:{type:"base64",media_type:payload.mt,data:payload.data}}
          :{type:"image",source:{type:"url",url:payload.url}};
        try{
          const base=await scanBase();setBaseInfo(base);
          if(cancelRef.current)return;
          setSimPhase("generating");
          const armies=await generateArmies(base);
          const total=Math.min(armies.length,20);setSimTotal(total);
          if(cancelRef.current)return;
          setSimPhase("running");
          const results=[];
          for(let i=0;i<total;i++){
            if(cancelRef.current)break;
            setSimCurrent(i+1);
            try{
              const res=await simulateAttack(armies[i],base);
              results.push(res);
              const sorted=[...results].sort((a,b)=>b.stars-a.stars||b.destruction-a.destruction);
              setSimResults([...sorted]);setBestResult(sorted[0]);
            }catch{
              results.push({id:armies[i].id,name:armies[i].name,army:armies[i].army,spells:armies[i].spells,siege:armies[i].siege,pet:armies[i].pet,stars:0,destruction:0,timeline:[],key_moment:"",verdict:"Ошибка",fail_reason:"Не удалось"});
            }
          }
          if(!cancelRef.current){
            const thumb=payload.kind==="base64"?(await makeThumbnail(preview))||null:preview;
            const best=[...results].sort((a,b)=>b.stars-a.stars||b.destruction-a.destruction)[0];
            const entry={id:Date.now(),date:new Date().toLocaleString("ru-RU"),th,preview:thumb,best_name:best?.name,best_stars:best?.stars,best_dest:best?.destruction,base_th:base.th_level,total:results.length};
            const nh=[entry,...history].slice(0,20);
            setHistory(nh);
            try{await window.storage.set("coc_sim_v2",JSON.stringify(nh));}catch{}
            setSimPhase("done");showToast("✅ Симуляция завершена!");
          }
        }catch(err){setError("❌ "+err.message);setSimPhase("idle");}
        finally{setSimRunning(false);}
      };

                      <div style={{color:C.muted,fontSize:"12px",marginBottom:"22px",lineHeight:1.8}}>ИИ проведёт 20 атак и найдёт лучший состав<br/><span style={{color:C.mutedLt}}>Камера · галерея · вставка · ссылка</span></div>

                        <label htmlFor={FILE_ID} style={{padding:"14px 20px",borderRadius:"13px",cursor:"pointer",background:`linear-gradient(135deg,${C.gold},${C.goldDark})`,color:"#000",fontWeight:900,fontSize:"15px",display:"flex",alignItems:"center",gap:"8px",userSelect:"none"}}>🖼️ Галерея</label>

                      </div>
                      <button onClick={()=>setShowUrl(v=>!v)} style={{marginTop:"16px",background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"8px 18px",borderRadius:"9px",cursor:"pointer",fontSize:"12px"}}>
                        🔗 {showUrl?"Скрыть":"Вставить ссылку"}
                      </button>
                      {showUrl&&(
                        <div style={{marginTop:"14px",textAlign:"left"}}>
                          <input value={urlVal} onChange={e=>setUrlVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&fromUrl()} placeholder="https://i.imgur.com/..."
                            style={{width:"100%",padding:"12px",borderRadius:"10px",background:C.surface,color:C.text,border:`1px solid ${C.border}`,fontSize:"14px",boxSizing:"border-box"}}/>
                          <button onClick={fromUrl} style={{marginTop:"8px",width:"100%",padding:"12px",background:`linear-gradient(135deg,${C.blue},${C.blueDark})`,color:"#fff",border:"none",borderRadius:"10px",fontWeight:800,cursor:"pointer",fontSize:"14px"}}>✓ Загрузить</button>
                        </div>
                      )}
                    </div>
                  </div>
                ):(
                  <div style={{background:C.card,borderRadius:"16px",border:`1px solid ${C.gold}44`,overflow:"hidden"}}>
                    {/* Main preview */}
                    <div style={{position:"relative",background:"#000"}}>
                      <img src={preview} alt="base" style={{width:"100%",maxHeight:"220px",objectFit:"contain",display:"block"}} onError={()=>setError("⚠️ Ошибка загрузки.")}/>
                      <div style={{position:"absolute",top:8,left:8,background:"#00000099",borderRadius:"7px",padding:"3px 9px",fontSize:"11px",color:C.green,fontWeight:800}}>✓ БАЗА ЗАГРУЖЕНА ({previews.length}/5)</div>
                      <button onClick={reset} style={{position:"absolute",top:8,right:8,background:"#000000cc",border:"1px solid #ffffff22",color:"#fff",borderRadius:"50%",width:29,height:29,cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                    </div>
                    {/* Thumbnails row */}
                    <div style={{display:"flex",gap:"8px",padding:"10px 12px",borderTop:`1px solid ${C.border}`,overflowX:"auto"}}>

                        <div key={i} onClick={()=>{setPreview(p.url);setPayload(p.kind==="url"?{kind:"url",url:p.url}:{kind:"base64",data:p.data,mt:p.mt});}}
                          style={{position:"relative",flexShrink:0,width:70,height:52,borderRadius:"8px",overflow:"hidden",border:`2px solid ${preview===p.url?C.gold:C.border}`,cursor:"pointer"}}>
                          <img src={p.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                          <button onClick={e=>{e.stopPropagation();const np=previews.filter((_,j)=>j!==i);setPreviews(np);if(np.length===0){reset();}else{setPreview(np[0].url);setPayload(np[0].kind==="url"?{kind:"url",url:np[0].url}:{kind:"base64",data:np[0].data,mt:np[0].mt});}}}
                            style={{position:"absolute",top:1,right:1,background:"#000000cc",border:"none",color:"#fff",borderRadius:"50%",width:18,height:18,cursor:"pointer",fontSize:"10px",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>✕</button>
                        </div>
                      ))}
                      {previews.length<5&&(
                        <label htmlFor={FILE_ID} style={{flexShrink:0,width:70,height:52,borderRadius:"8px",border:`2px dashed ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:C.muted,fontSize:"22px",userSelect:"none"}}>+</label>
                      )}
                    </div>
                    {baseInfo&&(
                      <div style={{padding:"10px 14px",borderTop:`1px solid ${C.border}`,display:"flex",flexWrap:"wrap",gap:"6px"}}>
                        <span style={{background:`${TH_CLR[baseInfo.th_level]||C.gold}22`,color:TH_CLR[baseInfo.th_level]||C.gold,fontSize:"11px",padding:"2px 9px",borderRadius:"6px",fontWeight:700}}>TH{baseInfo.th_level}</span>
                        <span style={{background:`${C.blue}20`,color:C.blue,fontSize:"11px",padding:"2px 9px",borderRadius:"6px"}}>{baseInfo.base_type}</span>
                        <span style={{background:`${C.green}18`,color:C.green,fontSize:"11px",padding:"2px 9px",borderRadius:"6px"}}>↘ {baseInfo.best_entry}</span>
                      </div>
                    )}
                  </div>
                )}

                {/* Войска */}
                <div style={{background:C.card,borderRadius:"16px",border:`1px solid ${C.border}`,padding:"14px"}}>
                  <div style={{color:C.muted,fontSize:"11px",letterSpacing:".8px",marginBottom:"8px"}}>🪖 МОИ ВОЙСКА <span style={{fontSize:"10px"}}>(необязательно)</span></div>
                  <textarea value={troops} onChange={e=>setTroops(e.target.value)} placeholder={`Оставь пустым — ИИ сам придумает составы...\nили: Super Witch, Lalo, Root Rider...`} rows={2}
                    style={{width:"100%",padding:"12px",borderRadius:"11px",boxSizing:"border-box",background:C.surface,color:C.text,border:`1px solid ${C.border}`,fontSize:"14px",fontFamily:"inherit",resize:"none",lineHeight:1.6}}/>
                </div>

                {/* RUN / CANCEL */}
                {simRunning?(
                  <button onClick={cancelSimulation} style={{padding:"18px",borderRadius:"14px",border:`1px solid ${C.red}44`,width:"100%",background:`${C.red}18`,color:C.red,fontWeight:900,fontSize:"15px",cursor:"pointer"}}>
                    ⏹ ОСТАНОВИТЬ
                  </button>
                ):(
                  <button onClick={runSimulation} disabled={!payload} style={{padding:"18px",borderRadius:"14px",border:"none",width:"100%",background:payload?`linear-gradient(135deg,${C.goldBright},${C.gold},#d97706)`:C.card,color:payload?"#000":C.muted,fontWeight:900,fontSize:"17px",cursor:payload?"pointer":"not-allowed",boxShadow:payload?`0 0 30px ${C.gold}40`:"none",transition:"all .25s"}}>
                    {!payload?"📸 Сначала загрузи скриншот":simPhase==="done"?"🔄 Симулировать снова":"🎯 ЗАПУСТИТЬ 20 СИМУЛЯЦИЙ"}
                  </button>
                )}

                {/* Progress */}
                {(simRunning||simPhase==="running")&&(
                  <div style={{background:C.card,borderRadius:"16px",border:`1px solid ${C.border}`,padding:"14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
                      <span style={{color:C.muted,fontSize:"12px"}}>{phaseLabel}</span>
                      <span style={{color:C.gold,fontSize:"12px",fontWeight:800}}>{simPhase==="running"?`${progress}%`:""}</span>
                    </div>
                    <StarBar pct={progress}/>
                    {simResults.length>0&&(
                      <div style={{marginTop:"10px",display:"flex",gap:"14px"}}>
                        <span style={{color:C.gold,fontSize:"12px"}}>⭐⭐⭐ {threeStarCount}</span>
                        <span style={{color:C.orange,fontSize:"12px"}}>⭐⭐ {twoStarCount}</span>
                        <span style={{color:C.mutedLt,fontSize:"12px"}}>Топ: {simResults[0]?.name||"—"}</span>
                      </div>
                    )}
                  </div>
                )}

                {error&&<div style={{background:"#1a0808",borderRadius:"13px",padding:"14px",color:C.red,fontSize:"14px",border:`1px solid ${C.red}33`}}>{error}</div>}

                {/* Winner card */}
                {bestResult&&(simPhase==="done"||simResults.length>0)&&(
                  <div style={{background:`linear-gradient(135deg,${C.gold}18,${C.goldDark}10)`,borderRadius:"20px",border:`2px solid ${C.gold}66`,padding:"20px",position:"relative",overflow:"hidden"}}>
                    <div style={{position:"absolute",top:0,right:0,fontSize:"80px",opacity:0.07,lineHeight:1}}>🏆</div>
                    <div style={{color:C.goldBright,fontWeight:900,fontSize:"13px",letterSpacing:"2px",marginBottom:"6px"}}>🏆 ПОБЕДИТЕЛЬ</div>
                    <div style={{fontWeight:900,fontSize:"22px",marginBottom:"4px"}}>{bestResult.name}</div>
                    <div style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"12px"}}>
                      <span style={{fontSize:"24px"}}>{STAR_LABEL[bestResult.stars]}</span>
                      <span style={{color:C.gold,fontWeight:900,fontSize:"18px"}}>{bestResult.destruction}%</span>
                    </div>
                    <div style={{marginBottom:"12px"}}><StarBar pct={bestResult.destruction} color={bestResult.destruction>=80?C.green:C.orange}/></div>
                    <div style={{background:`${C.gold}10`,borderRadius:"10px",padding:"12px",marginBottom:"12px"}}>
                      <div style={{color:C.muted,fontSize:"11px",marginBottom:"4px"}}>🪖 СОСТАВ</div>
                      <div style={{color:C.text,fontSize:"13px",lineHeight:1.6}}>{bestResult.army}</div>
                      <div style={{color:C.mutedLt,fontSize:"12px",marginTop:"4px"}}>⚡ {bestResult.spells} · 🏰 {bestResult.siege} · 🐾 {bestResult.pet}</div>
                    </div>
                    {bestResult.key_moment&&<div style={{background:`${C.purple}15`,borderRadius:"10px",padding:"10px 12px",marginBottom:"12px",border:`1px solid ${C.purple}33`,color:C.text,fontSize:"12px"}}>💡 {bestResult.key_moment}</div>}
                    {bestResult.timeline?.length>0&&(
                      <div style={{marginBottom:"12px"}}>
                        <div style={{color:C.muted,fontSize:"11px",marginBottom:"6px"}}>📋 ХОД АТАКИ</div>
                        {bestResult.timeline.map((t,i)=>(
                          <div key={i} style={{display:"flex",gap:"8px",marginBottom:"4px"}}>
                            <span style={{color:C.gold,fontSize:"12px",fontWeight:700,minWidth:"24px"}}>{i+1}.</span>
                            <span style={{color:C.text,fontSize:"12px",lineHeight:1.5}}>{t}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{display:"flex",gap:"8px"}}>
                      <button onClick={shareResult} style={{flex:1,padding:"12px",borderRadius:"12px",border:`1px solid ${C.gold}44`,background:`${C.gold}10`,color:C.gold,fontWeight:800,fontSize:"14px",cursor:"pointer"}}>📤 Поделиться</button>
                      <button onClick={()=>{setTroops(bestResult.army+", "+bestResult.spells);showToast("✓ Выбрано!");}} style={{padding:"12px 16px",borderRadius:"12px",border:`1px solid ${C.green}44`,background:`${C.green}10`,color:C.green,fontWeight:800,fontSize:"14px",cursor:"pointer"}}>✓</button>
                    </div>
                  </div>
                )}

                {/* Tournament table */}
                {simResults.length>0&&(
                  <div style={{background:C.card,borderRadius:"16px",border:`1px solid ${C.border}`,overflow:"hidden"}}>
                    <div style={{padding:"14px 16px 10px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{color:C.gold,fontWeight:800,fontSize:"13px"}}>📊 ТУРНИРНАЯ ТАБЛИЦА</div>
                      <span style={{color:C.muted,fontSize:"11px"}}>{simResults.length} атак</span>
                    </div>
                    <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:"16px"}}>
                      <div style={{textAlign:"center"}}><div style={{color:C.gold,fontWeight:900,fontSize:"18px"}}>{threeStarCount}</div><div style={{color:C.muted,fontSize:"10px"}}>3★</div></div>
                      <div style={{textAlign:"center"}}><div style={{color:C.orange,fontWeight:900,fontSize:"18px"}}>{twoStarCount}</div><div style={{color:C.muted,fontSize:"10px"}}>2★</div></div>
                      <div style={{textAlign:"center"}}><div style={{color:C.green,fontWeight:900,fontSize:"18px"}}>{avgDest}%</div><div style={{color:C.muted,fontSize:"10px"}}>сред.</div></div>
                      <div style={{textAlign:"center"}}><div style={{color:C.text,fontWeight:900,fontSize:"18px"}}>{simResults.length}</div><div style={{color:C.muted,fontSize:"10px"}}>всего</div></div>
                    </div>
                    <div>
                      {simResults.map((r,idx)=>(
                        <div key={r.id||idx}>
                          <div onClick={()=>setExpandedResult(expandedResult===idx?null:idx)} style={{padding:"10px 14px",borderBottom:idx<simResults.length-1?`1px solid ${C.border}`:"none",display:"flex",alignItems:"center",gap:"10px",background:idx===0?`${C.gold}08`:"transparent",cursor:"pointer"}}>
                            <div style={{minWidth:28,textAlign:"center",fontWeight:900,fontSize:"13px",color:idx===0?C.gold:idx<3?C.orange:C.muted}}>{idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":`#${idx+1}`}</div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontWeight:800,fontSize:"13px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:idx===0?C.gold:C.text}}>{r.name}</div>
                              <div style={{color:C.muted,fontSize:"11px",marginTop:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.army}</div>
                            </div>
                            <div style={{textAlign:"right",flexShrink:0}}>
                              <div style={{color:STAR_COLOR[r.stars]||C.muted,fontSize:"14px",fontWeight:900}}>{STAR_LABEL[r.stars]}</div>
                              <div style={{color:r.destruction>=80?C.green:r.destruction>=50?C.orange:C.red,fontSize:"12px",fontWeight:700}}>{r.destruction}%</div>
                            </div>
                            <span style={{color:C.muted,fontSize:"12px"}}>{expandedResult===idx?"▲":"▼"}</span>
                          </div>
                          {expandedResult===idx&&(
                            <div style={{background:C.surface,padding:"12px 14px",borderBottom:`1px solid ${C.border}`}}>
                              <div style={{color:C.mutedLt,fontSize:"12px",marginBottom:"4px"}}>⚡ {r.spells}</div>
                              <div style={{color:C.mutedLt,fontSize:"12px",marginBottom:"8px"}}>🏰 {r.siege} · 🐾 {r.pet}</div>
                              {r.key_moment&&<div style={{color:C.text,fontSize:"12px",marginBottom:"6px"}}>💡 {r.key_moment}</div>}
                              {r.fail_reason&&<div style={{color:C.red,fontSize:"12px"}}>❌ {r.fail_reason}</div>}
                              <button onClick={(e)=>{e.stopPropagation();setTroops(r.army+", "+r.spells);showToast("✓ Состав выбран!");}} style={{marginTop:"8px",padding:"7px 14px",background:`${C.gold}10`,border:`1px solid ${C.gold}33`,color:C.gold,borderRadius:"8px",cursor:"pointer",fontSize:"12px",fontWeight:700}}>🎯 Попробовать</button>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* TAB: ТРЕНДЫ */}
            {tab==="trends"&&(
              <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
                <div style={{textAlign:"center",paddingTop:"4px"}}>
                  <div style={{display:"inline-flex",alignItems:"center",gap:"6px",background:`${C.purple}18`,border:`1px solid ${C.purple}44`,borderRadius:"30px",padding:"5px 14px",color:C.purple,fontSize:"12px",fontWeight:700,marginBottom:"12px"}}>📡 YouTube · TikTok · Reddit</div>
                  <div style={{color:C.muted,fontSize:"13px",lineHeight:1.7,marginBottom:"14px"}}>Актуальные стратегии TH15–18 · 2026</div>
                  {!trends&&!tLoading&&<button onClick={loadTrends} style={{padding:"16px 44px",borderRadius:"14px",border:"none",background:`linear-gradient(135deg,${C.purple},${C.purpleDark})`,color:"#fff",fontWeight:900,fontSize:"16px",cursor:"pointer",boxShadow:`0 4px 24px ${C.purple}55`}}>📡 ЗАГРУЗИТЬ ТРЕНДЫ</button>}
                </div>
                {tLoading&&<div style={{textAlign:"center",color:C.muted,padding:"40px 20px"}}><div style={{fontSize:"44px",marginBottom:"14px"}} className="pulse">📡</div><div style={{fontSize:"14px",fontWeight:700}}>Ищу стратегии...</div></div>}
                {tError&&<div style={{background:"#1a0808",borderRadius:"13px",padding:"16px",color:C.red,fontSize:"13px"}}>{tError}<button onClick={loadTrends} style={{display:"block",marginTop:"12px",background:"none",border:`1px solid ${C.red}`,color:C.red,padding:"7px 14px",borderRadius:"8px",cursor:"pointer"}}>↺ Повторить</button></div>}
                {trends&&(
                  <>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{color:C.muted,fontSize:"12px"}}>🔥 {trends.updated}</span>
                      <button onClick={loadTrends} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"5px 11px",borderRadius:"7px",cursor:"pointer",fontSize:"11px"}}>🔄 Обновить</button>
                    </div>
                    {(trends.strategies||[]).map((s2,idx)=>{
                      const thN=s2.th?.match(/\d+/)?.[0];const thC=TH_CLR[parseInt(thN)]||C.gold;
                      return(
                        <div key={idx} style={{background:C.card,borderRadius:"16px",border:`1px solid ${C.border}`,padding:"16px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                              <span style={{background:`${C.purple}33`,color:C.purple,fontSize:"10px",fontWeight:800,padding:"2px 8px",borderRadius:"6px"}}>#{idx+1}</span>
                              <span style={{fontWeight:900,fontSize:"15px"}}>{s2.title}</span>
                            </div>
                            {s2.rating&&<div style={{color:C.gold,fontWeight:900,fontSize:"15px"}}>★ {s2.rating}</div>}
                          </div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"10px"}}>
                            {s2.th&&<span style={{background:`${thC}22`,color:thC,fontSize:"11px",padding:"2px 9px",borderRadius:"6px",fontWeight:700}}>{s2.th}</span>}
                            {(s2.tags||[]).map((tag,ti)=><span key={ti} style={{background:`${C.blue}20`,color:C.blue,fontSize:"11px",padding:"2px 9px",borderRadius:"6px"}}>{tag}</span>)}
                          </div>
                          {s2.army&&<div style={{color:C.mutedLt,fontSize:"12px",marginBottom:"6px"}}>🪖 {s2.army}</div>}
                          {s2.tip&&<div style={{background:`${C.gold}0e`,border:`1px solid ${C.gold}28`,borderRadius:"10px",padding:"10px 13px",color:C.text,fontSize:"13px",lineHeight:1.6,marginBottom:"10px"}}>💡 {s2.tip}</div>}
                          <button onClick={()=>{if(thN)setTh(thN);setTroops(s2.army||"");setTab("simulate");showToast("🎯 Стратегия выбрана!");}} style={{width:"100%",padding:"10px",background:`${C.gold}12`,border:`1px solid ${C.gold}33`,color:C.gold,borderRadius:"10px",cursor:"pointer",fontSize:"13px",fontWeight:700}}>🎯 Симулировать эту стратегию</button>
                        </div>
                      );
                    })}
                  </>
                )}
              </div>
            )}

            {/* TAB: ВОЙСКА */}
            {tab==="army"&&(
              <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
                <div style={{textAlign:"center",paddingTop:"4px"}}>
                  <div style={{display:"inline-flex",alignItems:"center",gap:"6px",background:`${C.green}18`,border:`1px solid ${C.green}44`,borderRadius:"30px",padding:"5px 14px",color:C.green,fontSize:"12px",fontWeight:700,marginBottom:"12px"}}>🌐 YouTube · TikTok · Reddit</div>
                  <div style={{color:C.muted,fontSize:"13px",lineHeight:1.7,marginBottom:"14px"}}>ТОП-4 состава для TH{th} · Июнь 2026</div>
                </div>
                <div style={{background:C.card,borderRadius:"16px",border:`1px solid ${C.border}`,padding:"14px"}}>
                  <div style={{color:C.muted,fontSize:"11px",letterSpacing:".8px",marginBottom:"12px"}}>🏰 ВЫБЕРИ TH</div>
                  <div style={{display:"flex",gap:"10px"}}>
                    {[15,16,17,18].map(n=>{const c=TH_CLR[n],active=th===String(n);return(
                      <button key={n} onClick={()=>{setTh(String(n));setArmyPicks(null);setArmyError(null);}} style={{flex:1,padding:"12px 4px",borderRadius:"12px",border:`2px solid ${active?c+"cc":C.border}`,background:active?`${c}18`:"transparent",color:active?c:C.muted,cursor:"pointer",fontWeight:900,fontSize:"13px",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
                        <span style={{fontSize:"20px"}}>🏰</span><span>TH{n}</span>
                      </button>
                    );})}
                  </div>
                </div>
                <button onClick={findBestArmy} disabled={armyLoading} style={{padding:"16px",borderRadius:"14px",border:"none",width:"100%",background:armyLoading?C.card:`linear-gradient(135deg,${C.green},#16a34a)`,color:armyLoading?C.muted:"#000",fontWeight:900,fontSize:"16px",cursor:armyLoading?"not-allowed":"pointer",boxShadow:armyLoading?"none":`0 4px 24px ${C.green}44`,transition:"all .25s"}}>
                  {armyLoading?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}><span className="spin">🌐</span>Ищу...</span>:`🌐 НАЙТИ ТОП-4 ДЛЯ TH${th}`}
                </button>
                {armyError&&<div style={{background:"#1a0808",borderRadius:"13px",padding:"14px",color:C.red,fontSize:"13px"}}>{armyError}<button onClick={findBestArmy} style={{display:"block",marginTop:"10px",background:"none",border:`1px solid ${C.red}`,color:C.red,padding:"6px 12px",borderRadius:"7px",cursor:"pointer",fontSize:"12px"}}>↺ Повторить</button></div>}
                {armyPicks&&(
                  <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                    {armyPicks.map((army,i)=>(
                      <div key={i} style={{background:C.card,borderRadius:"16px",border:`1px solid ${i===0?C.gold+"66":C.border}`,padding:"16px",position:"relative"}}>
                        {i===0&&<div style={{position:"absolute",top:12,right:12,background:`${C.gold}22`,color:C.gold,fontSize:"10px",fontWeight:800,padding:"2px 8px",borderRadius:"6px"}}>🏆 #1 META</div>}
                        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
                          <span style={{background:`${C.purple}33`,color:C.purple,fontSize:"11px",fontWeight:800,padding:"2px 9px",borderRadius:"6px"}}>#{army.rank||i+1}</span>
                          <span style={{fontWeight:900,fontSize:"15px",color:i===0?C.gold:C.text}}>{army.name}</span>
                        </div>
                        <div style={{display:"flex",gap:"8px",marginBottom:"10px",flexWrap:"wrap"}}>
                          {army.winrate&&<span style={{background:`${C.green}18`,color:C.green,fontSize:"12px",fontWeight:700,padding:"2px 10px",borderRadius:"6px"}}>✓ {army.winrate}</span>}
                          {army.rating&&<span style={{background:`${C.gold}18`,color:C.gold,fontSize:"12px",fontWeight:700,padding:"2px 10px",borderRadius:"6px"}}>★ {army.rating}</span>}
                          {army.source&&<span style={{background:`${C.blue}18`,color:C.blue,fontSize:"11px",padding:"2px 9px",borderRadius:"6px"}}>📺 {army.source}</span>}
                        </div>
                        <div style={{background:C.surface,borderRadius:"10px",padding:"10px 12px",marginBottom:"10px"}}>
                          <div style={{color:C.muted,fontSize:"10px",marginBottom:"4px"}}>🪖 СОСТАВ</div>
                          <div style={{color:C.text,fontSize:"13px",lineHeight:1.6,fontWeight:600}}>{army.army}</div>
                        </div>
                        <div style={{color:C.mutedLt,fontSize:"12px",marginBottom:"6px"}}>⚡ {army.spells}</div>
                        <div style={{color:C.mutedLt,fontSize:"12px",marginBottom:"10px"}}>🏰 {army.siege} · 🐾 {army.pet}</div>
                        {army.tip&&<div style={{background:`${C.gold}0e`,border:`1px solid ${C.gold}28`,borderRadius:"10px",padding:"10px 12px",color:C.text,fontSize:"12px",lineHeight:1.5,marginBottom:"12px"}}>💡 {army.tip}</div>}
                        <div style={{display:"flex",gap:"8px"}}>
                          <button onClick={()=>{setTroops(army.army+", "+army.spells);setTab("simulate");showToast("🎯 Состав выбран!");}} style={{flex:1,padding:"10px",background:`${C.gold}10`,border:`1px solid ${C.gold}33`,color:C.gold,borderRadius:"10px",cursor:"pointer",fontSize:"12px",fontWeight:700}}>🎯 Симулировать</button>
                          <button onClick={()=>{setTroops(army.army+", "+army.spells);showToast("✓ Выбрано!");}} style={{padding:"10px 14px",background:`${C.green}10`,border:`1px solid ${C.green}33`,color:C.green,borderRadius:"10px",cursor:"pointer",fontSize:"12px",fontWeight:700}}>✓</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* TAB: ИСТОРИЯ */}
            {tab==="history"&&(
              <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                {history.length===0?(
                  <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
                    <div style={{fontSize:"56px"}}>📜</div>
                    <div style={{fontWeight:800,color:C.text,marginTop:"14px",fontSize:"16px"}}>История пуста</div>
                    <div style={{fontSize:"13px",marginTop:"8px"}}>Каждая симуляция сохраняется здесь.</div>
                  </div>
                ):(
                  <>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{color:C.muted,fontSize:"13px"}}>🧠 {history.length} симуляций</span>
                      <button onClick={async()=>{setHistory([]);try{await window.storage.delete("coc_sim_v2");}catch{}showToast("🗑 История очищена");}} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"5px 12px",borderRadius:"8px",cursor:"pointer",fontSize:"12px"}}>🗑 Очистить</button>
                    </div>
                    {history.length>1&&(()=>{
                      const avg3=Math.round(history.filter(e=>e.best_stars===3).length/history.length*100);
                      const avgD=Math.round(history.reduce((s,e)=>s+(e.best_dest||0),0)/history.length);
                      return(
                        <div style={{background:C.card,borderRadius:"16px",border:`1px solid ${C.border}`,padding:"12px 14px"}}>
                          <div style={{color:C.muted,fontSize:"10px",letterSpacing:".8px",marginBottom:"8px"}}>📊 МОЯ СТАТИСТИКА</div>
                          <div style={{display:"flex",gap:"20px"}}>
                            <div><div style={{color:C.gold,fontWeight:900,fontSize:"20px"}}>{avg3}%</div><div style={{color:C.muted,fontSize:"10px"}}>3★ %</div></div>
                            <div><div style={{color:C.green,fontWeight:900,fontSize:"20px"}}>{avgD}%</div><div style={{color:C.muted,fontSize:"10px"}}>сред. %</div></div>
                            <div><div style={{color:C.text,fontWeight:900,fontSize:"20px"}}>{history.length}</div><div style={{color:C.muted,fontSize:"10px"}}>всего</div></div>
                          </div>
                        </div>
                      );
                    })()}
                    {history.map(entry=>{
                      const thC=TH_CLR[entry.base_th]||C.gold;
                      return(
                        <div key={entry.id} style={{background:C.card,borderRadius:"14px",padding:"12px",border:`1px solid ${C.border}`,display:"flex",gap:"12px",alignItems:"center"}}>
                          {entry.preview&&<img src={entry.preview} alt="" style={{width:72,height:52,objectFit:"cover",borderRadius:"9px",flexShrink:0}}/>}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:"11px",color:C.muted}}>{entry.date}</div>
                            <div style={{fontWeight:800,marginTop:"2px",color:thC}}>🏰 vs TH{entry.base_th} · TH{entry.th}</div>
                            <div style={{fontSize:"12px",color:C.gold,marginTop:"2px",fontWeight:700}}>🏆 {entry.best_name}</div>
                            <div style={{fontSize:"11px",color:C.muted,marginTop:"1px"}}>{STAR_LABEL[entry.best_stars]} · {entry.best_dest}% · {entry.total} атак</div>
                          </div>
                        </div>
                      );
                    })}
                  </>
                )}
              </div>
            )}

          </div>

          {/* BOTTOM TABS */}
          <div className="bottom-bar" style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",padding:"6px 10px 8px",zIndex:100,gap:"4px",boxShadow:"0 -4px 20px #00000060"}}>
            {renderTabBtn("simulate","🎯","Симуляция")}
            {renderTabBtn("trends","📡","Тренды")}
            {renderTabBtn("army","🪖","Войска")}
            {renderTabBtn("history","📜",`История (${history.length})`)}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
